name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: YCC_POS_IMPLEMENTATION
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
          
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Generate Prisma client
      run: |
        cd 03_API_GATEWAY
        npx prisma generate
      
    - name: Run ESLint
      run: pnpm lint --ignore-pattern node_modules --ignore-pattern dist || true
      
    - name: Run TypeScript check - API
      run: |
        cd 03_API_GATEWAY
        npx tsc --noEmit || true
        
    - name: Run TypeScript check - POS
      run: |
        cd 04_CORE_POS
        npx tsc --noEmit || true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: YCC_POS_IMPLEMENTATION
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ycc_pos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
          
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Setup database
      run: |
        cd 03_API_GATEWAY
        npx prisma migrate reset --force --skip-seed || true
        npx prisma migrate dev --name init || true
        npx prisma generate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ycc_pos_test
        
    - name: Run backend tests
      run: |
        cd 03_API_GATEWAY
        pnpm test || true
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ycc_pos_test
        JWT_SECRET: test-secret-key-for-ci
        JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: YCC_POS_IMPLEMENTATION
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
          
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Run POS tests
      run: |
        cd 04_CORE_POS
        pnpm test || true
        
    - name: Run KDS tests
      run: |
        cd 05_KDS_SYSTEM
        pnpm test || true
        
    - name: Run Admin tests
      run: |
        cd 06_ADMIN_PANEL
        pnpm test || true

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    
    defaults:
      run:
        working-directory: YCC_POS_IMPLEMENTATION
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
          
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Generate Prisma client
      run: |
        cd 03_API_GATEWAY
        npx prisma generate
        
    - name: Build API
      run: |
        cd 03_API_GATEWAY
        pnpm build
        
    - name: Build POS
      run: |
        cd 04_CORE_POS
        pnpm build
        
    - name: Build KDS
      run: |
        cd 05_KDS_SYSTEM
        pnpm build
        
    - name: Build Admin
      run: |
        cd 06_ADMIN_PANEL
        pnpm build
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          YCC_POS_IMPLEMENTATION/03_API_GATEWAY/dist
          YCC_POS_IMPLEMENTATION/04_CORE_POS/dist
          YCC_POS_IMPLEMENTATION/05_KDS_SYSTEM/dist
          YCC_POS_IMPLEMENTATION/06_ADMIN_PANEL/dist
