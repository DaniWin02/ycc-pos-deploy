name: Deploy to Staging

on:
  push:
    branches: [ develop ]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  STAGING_HOST: staging.yccpos.com
  STAGING_USER: deploy
  STAGING_PATH: /var/www/ycc-pos-staging

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v3
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
          
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run tests
      run: |
        cd 03_API_GATEWAY && pnpm test
        cd ../04_CORE_POS && pnpm test
        cd ../05_KDS_SYSTEM && pnpm test
        cd ../06_ADMIN_PANEL && pnpm test
        
    - name: Build applications
      run: |
        cd 03_API_GATEWAY && pnpm build
        cd ../04_CORE_POS && pnpm build
        cd ../05_KDS_SYSTEM && pnpm build
        cd ../06_ADMIN_PANEL && pnpm build
        
    - name: Build Docker images
      run: |
        # Build API image
        docker build -t ycc-pos-api:staging -f 03_API_GATEWAY/Dockerfile .
        
        # Build frontend images
        docker build -t ycc-pos-frontend:staging -f 04_CORE_POS/Dockerfile .
        docker build -t ycc-pos-kds:staging -f 05_KDS_SYSTEM/Dockerfile .
        docker build -t ycc-pos-admin:staging -f 06_ADMIN_PANEL/Dockerfile .
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Push Docker images
      run: |
        docker push ycc-pos/api:staging
        docker push ycc-pos/frontend:staging
        docker push ycc-pos/kds:staging
        docker push ycc-pos/admin:staging
        
    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ env.STAGING_HOST }}
        username: ${{ env.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          # Create deployment directory
          mkdir -p ${{ env.STAGING_PATH }}/deploy_$(date +%Y%m%d_%H%M%S)
          cd ${{ env.STAGING_PATH }}
          
          # Download latest images
          docker pull ycc-pos/api:staging
          docker pull ycc-pos/frontend:staging
          docker pull ycc-pos/kds:staging
          docker pull ycc-pos/admin:staging
          
          # Stop existing containers
          docker-compose down || true
          
          # Update docker-compose file
          cat > docker-compose.yml << EOF
          version: '3.8'
          
          services:
            api:
              image: ycc-pos/api:staging
              container_name: ycc-pos-api-staging
              restart: unless-stopped
              ports:
                - "3001:3001"
              environment:
                - NODE_ENV=staging
                - DATABASE_URL=postgresql://yccpos_user:yccpos_password@postgres:5432/ycc_pos_staging
                - REDIS_URL=redis://redis:6379
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
                - JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
              depends_on:
                - postgres
                - redis
              volumes:
                - ./logs:/app/logs
              networks:
                - ycc-pos-network
                
            frontend:
              image: ycc-pos/frontend:staging
              container_name: ycc-pos-frontend-staging
              restart: unless-stopped
              ports:
                - "3000:80"
              depends_on:
                - api
              networks:
                - ycc-pos-network
                
            kds:
              image: ycc-pos/kds:staging
              container_name: ycc-pos-kds-staging
              restart: unless-stopped
              ports:
                - "3002:80"
              depends_on:
                - api
              networks:
                - ycc-pos-network
                
            admin:
              image: ycc-pos/admin:staging
              container_name: ycc-pos-admin-staging
              restart: unless-stopped
              ports:
                - "3003:80"
              depends_on:
                - api
              networks:
                - ycc-pos-network
                
            postgres:
              image: postgres:16
              container_name: ycc-pos-postgres-staging
              restart: unless-stopped
              environment:
                - POSTGRES_DB=ycc_pos_staging
                - POSTGRES_USER=yccpos_user
                - POSTGRES_PASSWORD=yccpos_password
              volumes:
                - postgres_data:/var/lib/postgresql/data
              networks:
                - ycc-pos-network
                
            redis:
              image: redis:7
              container_name: ycc-pos-redis-staging
              restart: unless-stopped
              volumes:
                - redis_data:/data
              networks:
                - ycc-pos-network
                
          volumes:
            postgres_data:
            redis_data:
            
          networks:
            ycc-pos-network:
              driver: bridge
          EOF
          
          # Start services
          docker-compose up -d
          
          # Wait for services to be ready
          sleep 30
          
          # Run database migrations
          docker-compose exec api npx prisma migrate deploy
          
          # Health checks
          echo "Checking API health..."
          curl -f http://localhost:3001/health || exit 1
          
          echo "Checking frontend..."
          curl -f http://localhost:3000 || exit 1
          
          echo "Checking KDS..."
          curl -f http://localhost:3002 || exit 1
          
          echo "Checking Admin..."
          curl -f http://localhost:3003 || exit 1
          
          echo "Deployment completed successfully!"
          
          # Clean up old containers
          docker image prune -f
          docker container prune -f
          
    - name: Update deployment symlink
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ env.STAGING_HOST }}
        username: ${{ env.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd ${{ env.STAGING_PATH }}
          
          # Update current symlink
          rm -f current
          ln -s deploy_$(date +%Y%m%d_%H%M%S) current
          
          # Clean up old deployments (keep last 3)
          ls -1t deploy_* | tail -n +4 | xargs rm -rf
          
    - name: Run health checks
      run: |
        # Wait for deployment to be ready
        sleep 60
        
        # Check API health
        curl -f https://staging.yccpos.com/api/health || exit 1
        
        # Check frontend
        curl -f https://staging.yccpos.com || exit 1
        
        # Check KDS
        curl -f https://staging.yccpos.com/kds || exit 1
        
        # Check Admin
        curl -f https://staging.yccpos.com/admin || exit 1
        
    - name: Notify Slack
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: '🚀 YCC POS deployed to staging successfully!'
        
    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: '❌ YCC POS staging deployment failed!'
